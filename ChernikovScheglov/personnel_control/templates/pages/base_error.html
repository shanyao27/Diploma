{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ошибка{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #e8f3ed;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .error-container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(30, 58, 47, 0.1);
        }
        .error-image {
            max-width: 300px;
            margin-bottom: 30px;
        }
        h2 {
            color: #1e3a2f;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        p {
            color: #2b5e4b;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-home {
            background: linear-gradient(135deg, #1e3a2f, #2b5e4b);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(43, 94, 75, 0.3);
            color: white;
        }
        .btn-back {
            background: transparent;
            color: #2b5e4b;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-right: 10px;
            border: 2px solid #2b5e4b;
            transition: all 0.3s;
        }
        .btn-back:hover {
            background: #2b5e4b;
            color: white;
        }
    </style>
</head>
<body>
    <div class="error-container">
        {% block image %}{% endblock %}
        <h2>{% block error_code %}{% endblock %}</h2>
        <p>{% block error_message %}{% endblock %}</p>
        <div>
            <a href="javascript:history.back()" class="btn-back">← Назад</a>
            <a href="/" class="btn-home">На главную</a>
        </div>
    </div>
</body>
</html>
